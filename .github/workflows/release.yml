name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: openbotstack-runtime
          fetch-depth: 0

      - name: Checkout Core (dependency)
        uses: actions/checkout@v4
        with:
          repository: openbotstack/openbotstack-core
          path: openbotstack-core

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: openbotstack-runtime/web/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: openbotstack-runtime/web
        run: npm ci

      - name: Build Frontend
        working-directory: openbotstack-runtime/web
        run: npm run build

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: openbotstack-runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
