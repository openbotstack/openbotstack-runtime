name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: openbotstack-runtime

      - name: Checkout Core (dependency)
        uses: actions/checkout@v4
        with:
          repository: openbotstack/openbotstack-core
          path: openbotstack-core

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache-dependency-path: openbotstack-runtime/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Tests
        working-directory: openbotstack-runtime
        run: make binary test-v

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/user/package-lock.json

      - name: Build user frontend
        working-directory: web/user
        run: |
          npm ci
          npm run build

      - name: Build admin frontend
        working-directory: web/admin
        run: |
          npm ci
          npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: openbotstack-runtime

      - name: Checkout Core (dependency)
        uses: actions/checkout@v4
        with:
          repository: openbotstack/openbotstack-core
          path: openbotstack-core

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.1
          working-directory: openbotstack-runtime
