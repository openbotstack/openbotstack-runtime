# OpenBotStack Runtime - Docker Compose
#
# Usage:
#   docker compose up -d          # Start the service
#   docker compose logs -f        # Follow logs
#   open http://localhost:8080/ui/
#
# Stop:
#   docker compose down
#
# Build from the parent directory (../) to include openbotstack-core:
#   docker compose build
#
# Note: Build context is set to the parent directory so that the replace
# directive in go.mod (../openbotstack-core) resolves correctly.

services:
  openbotstack:
    build:
      context: ..
      dockerfile: openbotstack-runtime/Dockerfile
    # Or use a pre-built image:
    # image: ghcr.io/openbotstack/openbotstack:latest
    ports:
      - "8080:8080"
    environment:
      # Server
      - OBS_SERVER_ADDR=:8080
      # LLM provider (REQUIRED - set your API key)
      - OBS_LLM_PROVIDER=openai
      - OBS_LLM_API_KEY=${OPENAI_API_KEY:-}
      # Override model (optional)
      # - OBS_LLM_MODEL=gpt-4o
      # Override base URL (optional, for self-hosted providers)
      # - OBS_LLM_URL=https://api.openai.com/v1
      # Logging
      - OBS_LOG_LEVEL=info
      # Database
      - OBS_DATABASE_PATH=/app/data/openbotstack.db
      # Memory
      - OBS_DATA_DIR=/app/data/memory
      # Skills
      - OBS_SKILLS_PATH=/app/examples/skills
      # Auth (see DEPLOYMENT.md for details)
      - OBS_AUTH_STRICT=false
      # Set JWT_SECRET to enable JWT authentication alongside API keys
      # - JWT_SECRET=your-secure-random-secret
      # - JWT_STRICT=false
      # Seed default admin on first run (set to "false" to disable)
      - OBS_SEED_DEFAULTS=true
      # TLS (optional - see DEPLOYMENT.md for reverse proxy setup)
      # - OBS_TLS_CERT_FILE=/etc/tls/tls.crt
      # - OBS_TLS_KEY_FILE=/etc/tls/tls.key
    volumes:
      # Persist SQLite database and memory data
      - openbotstack-data:/app/data
      # Optional: mount custom config
      # - ./config.yaml:/etc/openbotstack/config.yaml:ro
      # Optional: mount TLS certificates
      # - ./tls:/etc/tls:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    # Resource limits (adjust for your workload)
    deploy:
      resources:
        limits:
          memory: 512M

  # -----------------------------------------------------------------------
  # Optional: PostgreSQL + pgvector for vector semantic search
  # Uncomment and set OBS_VECTOR_DB_URL to enable
  # -----------------------------------------------------------------------
  # postgres:
  #   image: pgvector/pgvector:pg16
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_DB: openbotstack
  #     POSTGRES_USER: openbotstack
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U openbotstack"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   restart: unless-stopped
  #
  # To use with openbotstack, add to environment:
  #   OBS_VECTOR_DB_URL: postgres://openbotstack:changeme@postgres:5432/openbotstack?sslmode=disable

volumes:
  openbotstack-data:
  # pgdata:
