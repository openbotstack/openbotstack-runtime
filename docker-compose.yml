# OpenBotStack Local Development Stack
#
# Usage:
#   docker-compose up -d
#   open http://localhost:8080/ui/
#
# Stop:
#   docker-compose down

services:
  # OpenBotStack runtime
  openbotstack:
    build:
      context: .
      dockerfile: Dockerfile
    # Or use pre-built image:
    # image: ghcr.io/openbotstack/openbotstack:latest
    ports:
      - "8080:8080"
    environment:
      - OBS_ADDR=:8080
      - OBS_REDIS_URL=redis://redis:6379
      - OBS_LOG_LEVEL=info
      - OBS_LOG_FORMAT=json
      # LLM provider (set your API key)
      - OBS_LLM_PROVIDER=openai
      - OBS_LLM_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Redis for short-term memory
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
  # Milvus for long-term memory (optional)
  # Uncomment if you need vector storage
  #
  # milvus:
  #   image: milvusdb/milvus:v2.3-latest
  #   ports:
  #     - "19530:19530"
  #   volumes:
  #     - milvus-data:/var/lib/milvus
  #   environment:
  #     - ETCD_ENDPOINTS=etcd:2379
  #   depends_on:
  #     - etcd
  #
  # etcd:
  #   image: quay.io/coreos/etcd:v3.5.5
  #   environment:
  #     - ETCD_AUTO_COMPACTION_MODE=revision
  #     - ETCD_AUTO_COMPACTION_RETENTION=1000
  #     - ETCD_QUOTA_BACKEND_BYTES=4294967296
  #   volumes:
  #     - etcd-data:/etcd

volumes:
  redis-data:
