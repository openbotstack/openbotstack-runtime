server:
  addr: ":8080"

providers:
  llm:
    default: openai
    openai:
      base_url: "https://api.openai.com/v1"
      api_key: ""  # Set via OBS_LLM_API_KEY environment variable
      model: "gpt-4o-mini"

observability:
  log_level: "info"
  otel_enabled: false
  otel_endpoint: ""

memory:
  data_dir: "./data"
  summary_threshold: 20
  summary_enabled: true
  max_history_messages: 50

# Optional: Vector search (requires PostgreSQL + pgvector)
# vector:
#   enabled: false
#   database_url: ""  # env: OBS_VECTOR_DB_URL
#   model: "text-embedding-3-small"
#   dimensions: 512

# Optional: TLS configuration
# tls:
#   cert_file: ""
#   key_file: ""

# Optional: Sandbox configuration
# sandbox:
#   http_allowlist: []
#   tool_registry_url: ""
