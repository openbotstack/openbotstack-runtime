id: core/math.add
name: Math Add
description: Adds two numbers and returns the sum
version: 1.0.0
type: code
input_schema:
  type: object
  properties:
    a:
      type: number
      description: First number
    b:
      type: number
      description: Second number
  required:
    - a
    - b
output_schema:
  type: object
  properties:
    sum:
      type: number
      description: The sum of a and b
    error:
      type: string
      description: Error message if operation failed
