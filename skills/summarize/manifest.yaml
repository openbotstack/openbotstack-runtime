version: 1.0.0
id: summarize
name: Text Summarizer
description: Summarizes text into concise bullet points using LLM
execution:
  mode: declarative
input_schema:
  type: object
  properties:
    text:
      type: string
      description: The text to summarize
    max_points:
      type: integer
      description: Maximum number of bullet points (default 5)
    focus:
      type: string
      description: Optional aspect to focus on (e.g., "action items", "key decisions")
  required:
    - text
output_schema:
  type: object
  properties:
    summary:
      type: array
      items:
        type: string
      description: Array of summary bullet points
permissions: []
timeout: 120s
